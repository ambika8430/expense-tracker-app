<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Report</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="w-100 d-flex flex-column align-items-center">
        <!-- Load the Header -->
        <div id="header" class="w-100"></div>
    
        <h1 class="mt-5">Expense Report</h1>

        <div class="w-75 mt-4 filter-container d-flex align-items-center gap-3">
            <label for="filterType">Filter By:</label>
            <select id="filterType" class="form-select">
                <option value="daily" selected>Daily</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
            </select>
        
            <input type="date" id="datePicker" class="form-control">
            <input type="week" id="weekPicker" class="form-control d-none">
            <input type="month" id="monthPicker" class="form-control d-none">
        
            <button id="applyFilter" class="btn btn-primary">Apply</button>
        </div>        

    <div class="container p-4">

        <table class="table table-bordered mb-2">
            <thead class="table-dark">
                <tr>
                    <th>Sr No</th>
                    <th>Description</th>
                    <th>Category</th>
                    <th>Income</th>
                    <th>Expense</th>
                </tr>
            </thead>
            <tbody id="expenseTableBody">
                <!-- Expenses will be dynamically inserted here -->
            </tbody>
        </table>

        <div class="text-center mt-4">
            <button id="download-report" class="btn btn-primary">Download Report</button>
        </div>
    </div>

    <script src="../scripts/script.js"></script>
    <script src="../scripts/filter.js"></script>
</body>
</html>

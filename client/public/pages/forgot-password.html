<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex justify-content-center align-items-center vh-100 bg-light p-24">
    <div class="container p-4 bg-white rounded shadow-sm text-center" style="max-width: 700px;">
        <h2>Forgot Password</h2>
        <div id="forgot-password-form">
            <p class="text-muted">Enter your email to receive password reset instructions.</p>
            <form>
                <input type="email" class="form-control mb-3 forgot-email" placeholder="Email" required>
                <button type="submit" class="btn btn-primary w-100">Reset Password</button>
            </form>
            <div class="mt-3">
                <a href="/sign-in.html">Back to Sign In</a>
            </div>
        </div>
        <div id="sent-password-form" style="display: none;">
            <p class="mt-3 fs-5">Password reset link had been sent to your email id.</p>
            <div class="mt-3">
                <a href="/sign-in.html">Back to Sign In</a>
            </div>
        </div>
    </div>
    <script src="../scripts/auth.js"></script>
</body>
</html>
